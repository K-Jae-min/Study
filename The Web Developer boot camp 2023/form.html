<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms Demo</title>
  </head>
  <body>
    <h1>Forms Demo</h1>
    <form action="/tacos">
      <p>
        <label for="username">Enter a Username</label>
        <input id="username" type="text" placeholder="username" name="username" />
      </p>
      <p>
        <label for="password">Enter a Password</label>
        <input id="password" type="password" placeholder="passowrd" name="password" />
      </p>
      <p>
        <label for="color">Enter a Color</label>
        <input id="color" type="color" name="color" />
      </p>
      <p>
        <label for="number">Enter a Number</label>
        <input id="number" type="number" placeholder="enter a number" name="num" min="1" max="10" />
      </p>
      <button type="button">Submit</button>
      <input type="submit" value="click Me!" />
    </form>
    <hr />
    <button>Not Inside Form</button>
    <h2>Hijacking Searches</h2>
    <h3>Search Naver</h3>
    <form action="https://search.naver.com/search.naver">
      <input type="text" name="query" />
      <button>네이버 검색하기</button>
    </form>
    <h3>Search Google</h3>
    <form action="https://www.google.co.kr/search">
      <input type="text" name="q" />
      <button>구글검색</button>
    </form>
    <h3>Search Youtube</h3>
    <form action="https://www.youtube.com/results">
      <input type="text" name="search_query" />
      <button>유튜브검색</button>
    </form>

    <h2>More Inputs!</h2>
    <form action="/birs">
      <input type="checkbox" name="agree_tos" id="agree" checked />
      <label for="agree">동의합니다</label>
      <p>
        <input type="radio" name="size" id="xs" value="xs" />
        <label for="xs">XS</label>
        <input type="radio" name="size" id="" value="s" />
        <label for="s">S</label>
        <input type="radio" name="size" id="" value="m" />
        <label for="m">M</label>
      </p>
      <p>
        <label for="meal">음식을 골라주세요</label>
        <select name="meal" id="meal">
          <option value="fish">Fish</option>
          <option value="veg">Vegetarian</option>
          <option value="meat">Meat</option>
        </select>
      </p>
      <p>
        <label for="cheese">Amount of Cheese</label>
        <input type="range" id="chesse" min="1" max="100" name="cheese" value="1" />
      </p>

      <p><label for="requests">Any Special Requests?</label></p>
      <br />
      <textarea name="Requests?" id="requests" cols="30" rows="10" placeholder="Type something here"></textarea>
      <button>Submit</button>
    </form>
    <h2>Validations Demo</h2>
    <form action="/dummy">
      <label for="first">Enter First Name</label>
      <input type="text" name="first" id="first" required />
      <p>
        <label for="username"></label>
        <input type="text" name="username" id="username" minlength="5" maxlength="20" required />
      </p>
      <p>
        <input type="email" required />
      </p>
      <p>
        <input type="url" />
      </p>
      <button>submit</button>
    </form>
  </body>
</html>
